name: Build and Release EXE, DMG and Linux

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PyInstaller build for Windows
        run: python build.py
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Upload Windows Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/AI_Stock_Analyzer_Pro_${{ github.event.release.tag_name }}.zip
          asset_name: AI_Stock_Analyzer_Pro_${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and create-dmg
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          brew install create-dmg

      - name: Run PyInstaller build for macOS
        run: python build.py
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Upload macOS Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/AI_Stock_Analyzer_Pro_${{ github.event.release.tag_name }}.dmg
          asset_name: AI_Stock_Analyzer_Pro_${{ github.event.release.tag_name }}.dmg
          asset_content_type: application/x-apple-diskimage

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PyInstaller build for Linux
        run: python build.py
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Upload Linux Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/AI_Stock_Analyzer_Pro_${{ github.event.release.tag_name }}_Linux.tar.gz
          asset_name: AI_Stock_Analyzer_Pro_${{ github.event.release.tag_name }}_Linux.tar.gz
          asset_content_type: application/gzip